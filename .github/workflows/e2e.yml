name: e2e

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_HOST: unix:///var/run/docker.sock

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.31.0
      - name: Build plugin binaries
        run: make build
      - name: Run e2e tests
        run: make test-e2e
