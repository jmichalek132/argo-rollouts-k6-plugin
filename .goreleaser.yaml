version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: metric-plugin
    main: ./cmd/metric-plugin
    binary: metric-plugin
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: step-plugin
    main: ./cmd/step-plugin
    binary: step-plugin
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: binary
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: jmichalek132
    name: argo-rollouts-k6-plugin
