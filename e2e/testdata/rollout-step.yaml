apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: k6-step-e2e
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: k6-step-e2e
  template:
    metadata:
      labels:
        app: k6-step-e2e
    spec:
      containers:
        - name: app
          # Use the already-loaded image to avoid Docker Hub pulls in kind.
          image: k6-plugin-binaries:e2e
          imagePullPolicy: Never
          command: ["sh", "-c", "sleep 3600"]
          securityContext:
            runAsUser: 65534
  strategy:
    canary:
      steps:
        - setWeight: 20
        - plugin:
            name: jmichalek132/k6-step
            config:
              testId: "200"
              apiToken: "test-token"
              stackId: "1"
              timeout: "2m"
        - setWeight: 100
