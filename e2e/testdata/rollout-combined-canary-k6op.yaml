apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: k6-operator-combined-e2e
spec:
  metrics:
    - name: k6-thresholds
      interval: 10s
      count: 1
      successCondition: "result == 1"
      failureLimit: 0
      provider:
        plugin:
          jmichalek132/k6:
            provider: k6-operator
            configMapRef:
              name: k6-e2e-script-long
              key: test.js
            runnerImage: "grafana/k6:0.56.0"
            metric: thresholds
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: k6-combined-canary-k6op-e2e
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: k6-combined-canary-k6op-e2e
  template:
    metadata:
      labels:
        app: k6-combined-canary-k6op-e2e
    spec:
      containers:
        - name: app
          image: k6-plugin-binaries:e2e
          imagePullPolicy: Never
          command: ["sh", "-c", "sleep 3600"]
          securityContext:
            runAsUser: 65534
  strategy:
    canary:
      analysis:
        templates:
          - templateName: k6-operator-combined-e2e
        startingStep: 1
      steps:
        - setWeight: 20
        - plugin:
            name: jmichalek132/k6-step
            config:
              provider: k6-operator
              configMapRef:
                name: k6-e2e-script-long
                key: test.js
              runnerImage: "grafana/k6:0.56.0"
              timeout: "5m"
        - setWeight: 100
