apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: k6-step-k6op-e2e
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: k6-step-k6op-e2e
  template:
    metadata:
      labels:
        app: k6-step-k6op-e2e
    spec:
      containers:
        - name: app
          image: k6-plugin-binaries:e2e
          imagePullPolicy: Never
          command: ["sh", "-c", "sleep 3600"]
          securityContext:
            runAsUser: 65534
  strategy:
    canary:
      steps:
        - setWeight: 20
        - plugin:
            name: jmichalek132/k6-step
            config:
              provider: k6-operator
              configMapRef:
                name: k6-e2e-script
                key: test.js
              runnerImage: "grafana/k6:0.56.0"
              timeout: "5m"
        - setWeight: 100
